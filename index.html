        const FILTER_TYPES = {
            ONGOING: "filter_type_ongoing",

            CHALLENGES: "filter_type_challenges",

        const clean_exclusions = ["corozal town"]

        // Helper to fetch local files
        function fetchFile(filename) {
            return fetch("./static/data/" + filename)
                .then((response) => {
                    if (!response.ok) {
                        throw new Error("Network response was not ok");
                    }
                    return response.text();
                })
                .catch((error) => console.error("Error loading GeoJSON:", error));
        }

        // Converts the CSV text data into a JSON array.
        function parseCSVtoJSON(csv_text) {
            const lines = csv_text.trim().split("\n"); // Separate CSV by line into an array.
            const dataLines = lines.slice(1); // Skip csv header row
            project_count = dataLines.length;

            // Return all processed Lines
            return dataLines.map((line, index) => {
                let pieces = [];
                let currentPiece = "";
                let insideQuotes = false;

                // Loops over each char to split commas while ignoring commas inside quotes.
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    let nextChar = line[i + 1];

                    if (char === '"') {
                        if (insideQuotes && nextChar === '"') {
                            currentPiece += '"';
                            i++;
                        } else {
                            insideQuotes = !insideQuotes;
                        }
                    } else if (char === ',' && !insideQuotes) {
                        pieces.push(currentPiece.trim());
                        currentPiece = "";
                    } else {
                        currentPiece += char;
                    }
                }
                pieces.push(currentPiece.trim());

                // Helper function to turn comma-separated strings into clean arrays
                // If string exists, split,trim and remove empty items, else return empty array
                const splitToArray = (str) => str ? str.split(",").map(item => item.trim().replace(/[\r\n]+/g, "")).filter(Boolean) : [];

                // Build JSON object using the processed CSV pieces
                return {
                    project_id: `P${String(index + 1).padStart(4, '0')}`, // Dynamically generates the project ID;  P0001, P0002, ... used later to map points on the map.
                    title: pieces[0], // project Title
                    ongoing: pieces[4], // ongoing Initiative?
                    lead_entity: pieces[5], // The Implementation Entity
                    implementationEntity: splitToArray(pieces[6]), // The Executing Entities
                    status: pieces[1], // Completed or Ongoing?
                    timeline: {
                        from: pieces[2] || "",
                        to: pieces[3] || ""
                    },
                    locations: {
                        corozal: splitToArray(pieces[16]),
                        orangeWalk: splitToArray(pieces[17]),
                        belize: splitToArray(pieces[18]),
                        cayo: splitToArray(pieces[19]),
                        stannCreek: splitToArray(pieces[20]),
                        toledo: splitToArray(pieces[21])
                    },
                    details: {
                        societalChallenges: pieces[10] ? JSON.parse(pieces[10]) : [],
                        ecosystemsTargeted: splitToArray(pieces[11]),
                        servicesEnhanced: pieces[12] || "",
                        beneficiaries: pieces[7] || "",
                        description: pieces[8] || "",
                        funder: pieces[9] || "",
                        climate_risks: pieces[13] || "",
                        biodiversity_risks: pieces[14] || "",
                        references: splitToArray(pieces[15])
                    }
                };
                //console.log(JSON.stringify(obj, null, 2));
            });
        }

        function createProjectCards(obj, fragment) {
            var proj_card = document.createElement("div");
            proj_card.setAttribute("id", "nbs_info_" + obj.project_id);
            proj_card.setAttribute("class", "proj_card");

            //proj_card.projectData = obj; // Stores the project info object as a hidden property to be used by other functions
            proj_card.addEventListener('click', function () {

                showProjectInfo(obj);
                filterMarkersByProperty("project_id", obj.project_id);
            });

            var title_p = document.createElement("p");
            title_p.innerHTML = "<strong>" + obj.title + "</strong>";
            proj_card.appendChild(title_p);



            var proj_lead_implm_end = document.createElement("div");
            var lead_ent = document.createElement("p");
            lead_ent.innerHTML = "<strong>Lead Entity:</strong><p>" + (obj.lead_entity ? obj.lead_entity : "undefined" + "</p>");
            proj_lead_implm_end.appendChild(lead_ent);
            proj_card.appendChild(proj_lead_implm_end);


            createExpandableSection(proj_card, "Societal Challenges", obj.details?.societalChallenges)

            fragment.appendChild(proj_card);
        }

            })

        function createExpandableSection(card, label, items) {
            if (!items || items.length === 0) return;
            var section = $('<div class="card-section"></div>');
            var mainLine = $('<p class="summary-line"></p>').text(label + ": " + items[0]);
            if (items.length > 1) {
                var extraCount = items.length - 1;
                var plusBtn = $('<span class="expand-btn"' + 'data-original="' + extraCount + '" style="cursor:pointer; color:blue; margin-left:5px;">(+' + extraCount + ')</span>');
                var fullList = $('<ul class="full-list" style="display:none; margin: 5px 0 0 10px;"></ul>');
                $.each(items, function (i, item) {
                    fullList.append($('<li></li>').text(item));
                });
                plusBtn.on('click', function (e) {
                    e.stopPropagation(); // Prevents bubbling if the card itself is clickable
                    var willShow = !fullList.is(':visible');
                    fullList.slideToggle();
                    plusBtn.text(willShow ? '(-)' : '(+' + plusBtn.data('original') + ')');
                });
                mainLine.append(plusBtn);
                section.append(mainLine, fullList);
            } else {
                section.append(mainLine);
            }
            $(card).append(section);
        }

        // This Section is for filtering the sidebar Cards===========================================
        function renderCards(data) {
            var proj_cards = document.getElementById("proj_card_display");
            proj_cards.innerHTML = "";
            const fragment = document.createDocumentFragment();
            data.forEach(project => createProjectCards(project, fragment))
            document.getElementById("proj_card_display").appendChild(fragment);

            $("#sidebar_loader").fadeOut("slow");
            document.getElementById("sidebar_container").style.overflowY = "scroll";
        }

        function reloadCards() {
            renderCards(dataset)
        }

        function getFilteredDataset(type, textValue) {
            if (!textValue || textValue.trim() === "") return dataset;

            const search = textValue.trim().toLowerCase();

            return dataset.filter(project => {
                switch (type) {
                    case FILTER_TYPES.ONGOING:
                        return project.status === "Ongoing";
                    case FILTER_TYPES.COMPLETED:
                        return project.status === "Completed";
                    case FILTER_TYPES.NAME:
                        return project.title?.toLowerCase().includes(search);
                    case FILTER_TYPES.ECOSYSTEMS:
                        return (project.details?.ecosystemsTargeted || []).some(item => item.toLowerCase().includes(search));
                    case FILTER_TYPES.CHALLENGES:
                        return (project.details?.societalChallenges || []).some(item => item.toLowerCase().includes(search));
                    default:
                        return true;
                }
            });
        }

        function updateFilterOption(option) {
            const pFilter = document.getElementById("p_filter");
            const isStatusFilter = option === FILTER_TYPES.ONGOING || option === FILTER_TYPES.COMPLETED;

            pFilter.classList.toggle("hidden-filter", isStatusFilter);
            pFilter.value = "";

            const results = getFilteredDataset(option, isStatusFilter ? "status_mode" : "");
            renderCards(results);
        }

        function updateFilterByString(text) {
            const pFilterType = document.getElementById("p_filter_type").value;
            const results = getFilteredDataset(pFilterType, text);
            renderCards(results);
        }

        // Fetch location_coordinates.csv and map it to a JSON array
        function buildGeoJSON() {
            return fetchFile("location_coordinates.csv").then((data) => {
                const lines = data.trim().split("\n");
                const coord_dict = {};
                // Loop through each line of the CSV file
                lines.slice(1).forEach(line => {
                    const values = line.split(",");
                    if (values.length < 4) return; // Skip broken rows
                    const district = values[0].trim().toLowerCase();
                    const locationName = values[1].trim();
                    const lat = parseFloat(values[2]);
                    const long = parseFloat(values[3]);
                    // If coordinates are valid numbers and not zeros, save them
                    // This will remove any location that has 0,0 for latlong in location_coordinates.csv
                    if (!isNaN(lat) && !isNaN(long) && (lat !== 0 || long !== 0)) {
                        const lower_loc = locationName.toLowerCase();
                        let lookup_Key;
                        // exclusion check and key creation
                        if (clean_exclusions.some(ex => lower_loc.includes(ex))) {
                            lookup_Key = `${district.replace(/[^a-z0-9]/g, '')}_${lower_loc.replace(/[^a-z0-9]/g, '')}`;
                        } else {
                            // Normal cleanup rules for everything else
                            const cleanLoc = lower_loc.replace(/\s+village\s*|\s+town\s*/g, '').replace(/[^a-z0-9]/g, '');
                            lookup_Key = `${district.replace(/[^a-z0-9]/g, '')}_${cleanLoc}`;
                        }
                        coord_dict[lookup_Key] = { lat, long, originalName: locationName };
                    }
                });
                // Loop through loaded project list
                const features = [];
                dataset.forEach(project => {
                    // Loop through each district inside the current project's location list
                    Object.entries(project.locations).forEach(([district, locations]) => {
                        const cleanDistKey = district.toLowerCase();
                        // Loop through every location name inside that district
                        locations.forEach(locName => {
                            const lower_loc = locName.toLowerCase();
                            let clean_loc_key;

                            // exclusion check and key lookup
                            if (clean_exclusions.some(ex => lower_loc.includes(ex))) {
                                clean_loc_key = lower_loc.replace(/[^a-z0-9]/g, '');
                            } else {
                                clean_loc_key = lower_loc.replace(/\s+village\s*|\s+town\s*/g, '').replace(/[^a-z0-9]/g, '');
                            }

                            const match = coord_dict[`${cleanDistKey}_${clean_loc_key}`];
                            // If match found, build the map marker object
                            if (match) {
                                features.push({
                                    type: "Feature",
                                    geometry: { type: "Point", coordinates: [match.long, match.lat] },
                                    properties: {
                                        project_id: project.project_id,
                                        district: district,
                                        location: match.originalName,
                                        project_title: project.title,
                                    }
                                });
                            } else {
                                // Log locations not found on the location_coordinates  CSV
                                console.warn(`Location not found: "${locName}" in district "${district}" (Looked for key: "${`${cleanDistKey}_${clean_loc_key}`}")`);
                            }
                        });
                    });
                });
                geojson_features.features = features;
                loadDefaultMap();
            });
        }

        function initData() {
            buildProjectCardSideBar().then(() => {
                buildGeoJSON()
            })

            document.getElementById("about_inventory_text").addEventListener('click', function () {
                showAboutInfo();
            })
        }

    <!--Script for loading the map and its markers-->
    <script>
        var map = L.map("map").setView([17.097111994309312, -88.71966058916018], 8);

        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;
            console.log("Latitude: " + lat + ", Longitude: " + lng);
        });

        function makeMarkerLayer() {
            return geoJsonLayer = L.geoJSON(geojson_features, {
                onEachFeature: function (feature, layer) {
                    layer.bindPopup('<p>' + feature.properties.project_title + ' ' + feature.properties.district + ' ' + feature.properties.location + '</p>');
                }
            });
        }

        // Adds all markers from geojson_features to the map.
        function loadDefaultMap() {
            markers = L.markerClusterGroup({
                disableClusteringAtZoom: 15,
                showCoverageOnHover: false
            });
            markers.addLayer(makeMarkerLayer());
            map.addLayer(markers);
        }

        // Clears the markers from the Map and then re-adds all markers from geojson_features to the map.
        function refreshMap() {
            markers.clearLayers();
            loadDefaultMap();
        }
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 14,
            attribution:
                '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        }).addTo(map);

        // Add a refresh button to the map
        var refreshControl = L.Control.extend({
            options: {
                position: 'topleft'
            },
            onAdd: function (map) {
                var btn = L.DomUtil.create('button', 'leaflet-bar refresh-btn');
                btn.innerHTML = '<img src="./static/img/icon/refresh-icon.png" style="width: 100%; height: 100%; object-fit: contain;" alt="Refresh">';
                btn.title = 'Refresh Map Markers';

                btn.style.backgroundColor = 'white';
                btn.style.width = '35px';
                btn.style.height = '35px';
                btn.style.cursor = 'pointer';

                L.DomEvent.on(btn, 'click', function (e) {
                    L.DomEvent.stopPropagation(e);
                    refreshMap();
                });

                return btn;
            }
        });
        map.addControl(new refreshControl());

        // Clears the markers from the Map and then adds only those that match the specified values proided
        function filterMarkersByProperty(propName, propVal) {
            markers.clearLayers();
            markers = L.markerClusterGroup({
                disableClusteringAtZoom: 15,
                showCoverageOnHover: false
            });
            var geoJsonLayer = L.geoJSON(geojson_features, {
                filter: function (feature) {
                    return feature.properties[propName].toString().toLowerCase() === propVal.toString().toLowerCase();
                },
                onEachFeature: function (feature, layer) {
                    layer.bindPopup('<p>' + feature.properties.project_title + ' ' + feature.properties.district + ' ' + feature.properties.location + '</p>');
                }
            });
            markers.addLayer(geoJsonLayer);
            map.addLayer(markers);
        }

    </script>
</body>

</html>

        // Helper to fech local files
        function fetchFile(filename) {
            return fetch("/static/data/" + filename)
                .then((response) => {

                    }
                    return response.text();
                })
                .catch((error) => console.error("Error loading GeoJSON:", error));

        // Converts the CSV text data into a JSON array.
        function parseCSVtoJSON(csv_text) {
            const lines = csv_text.trim().split("\n"); // Separate CSV by line into an array.
            const dataLines = lines.slice(1); // Skip csv header row
            project_count = dataLines.length;

            // Return all processed Lines
            return dataLines.map((line, index) => {
                let pieces = [];
                let currentPiece = "";
                let insideQuotes = false;

                // Loops over each char to split commas while ignoring commas inside quotes.
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    let nextChar = line[i + 1];

                    if (char === '"') {
                        if (insideQuotes && nextChar === '"') {
                            currentPiece += '"';
                            i++;
                        } else {
                            insideQuotes = !insideQuotes;
                        }
                    } else if (char === ',' && !insideQuotes) {
                        pieces.push(currentPiece.trim());
                        currentPiece = "";
                    } else {
                        currentPiece += char;
                    }
                }
                pieces.push(currentPiece.trim());

                // Helper function to turn comma-separated strings into clean arrays
                // If string exists, split,trim and remove empty items, else return empty array
                const splitToArray = (str) => str ? str.split(",").map(item => item.trim().replace(/[\r\n]+/g, "")).filter(Boolean) : [];

                // Build JSON object using the processed CSV pieces
                return {
                    project_id: `P${String(index + 1).padStart(4, '0')}`, // Dynamically generates the project ID;  P0001, P0002, ... used later to map points on the map.
                    title: pieces[0],
                    implementationEntity: splitToArray(pieces[4]),
                    status: pieces[1],
                    timeline: {
                        from: pieces[2] || "",
                        to: pieces[3] || ""
                    },
                    locations: {
                        corozal: splitToArray(pieces[13]),
                        orangeWalk: splitToArray(pieces[14]),
                        belize: splitToArray(pieces[15]),
                        cayo: splitToArray(pieces[16]),
                        stannCreek: splitToArray(pieces[17]),
                        toledo: splitToArray(pieces[18])
                    },
                    details: {
                        societalChallenges: pieces[7] ? JSON.parse(pieces[7]) : [],
                        ecosystemsTargeted: splitToArray(pieces[8]),
                        servicesEnhanced: pieces[9] || "",
                        beneficiaries: pieces[5] || "",
                        description: pieces[6] || "",
                        climate_risks: pieces[10] || "",
                        biodiversity_risks: pieces[11] || "",
                        references: splitToArray(pieces[12])
                    }
                };
                //console.log(JSON.stringify(obj, null, 2));
            });
        }

        function createExpandableSection(card, label, items) {
            if (!items || items.length === 0) return;
            var section = $('<div class="card-section"></div>');
            var mainLine = $('<p class="summary-line"></p>').text(label + ": " + items[0]);
            if (items.length > 1) {
                var extraCount = items.length - 1;
                var plusBtn = $('<span class="expand-btn"' + 'data-original="' + extraCount + '" style="cursor:pointer; color:blue; margin-left:5px;">(+' + extraCount + ')</span>');
                var fullList = $('<ul class="full-list" style="display:none; margin: 5px 0 0 10px;"></ul>');
                $.each(items, function (i, item) {
                    fullList.append($('<li></li>').text(item));
                });
                plusBtn.on('click', function (e) {
                    e.stopPropagation(); // Prevents bubbling if the card itself is clickable
                    var willShow = !fullList.is(':visible');
                    fullList.slideToggle();
                    plusBtn.text(willShow ? '(-)' : '(+' + plusBtn.data('original') + ')');
                });
                mainLine.append(plusBtn);
                section.append(mainLine, fullList);
            } else {
                section.append(mainLine);
            }
            $(card).append(section);
        }

        //"<p></p>"

        function showAboutInfo() {
            html = "<strong>Nature-Based Solutions Inventory for Belize</strong>" +
                "<strong>What is the Nature-Based Solutions Inventory?</strong>" +
                "<p>This inventory is intended to showcase the variety of nature-based solutions (NbS) projects (both completed and ongoing) that are being implemented in Belize’s diverse ecosystems. They represent commitments from the Belizean government, civil society organizations, and communities to place ecosystems and nature at the centre of their response to the climate and biodiversity crises, as well as to address increasing risks and vulnerabilities associated with a changing climate.</p>" +
                "<br>" +
                "<p>The inventory provides relevant information on the different NbS projects, including their NbS approaches, climate and biodiversity risks addressed, intended beneficiaries, and the ecosystems they target. It provides a useful compilation of NbS projects for the Belizean government, protected areas managers, adaptation and conservation practitioners, civil society organizations, communities, as well as funders to help them understand the landscape of implementation in Belize and facilitate the further adoption and mainstreaming of NbS. It could also help the target audience to research existing NbS efforts in different parts of Belize to understand gaps, avoid duplication of efforts, and facilitate partnership and collaboration. Furthermore, the inventory can be used to identify synergies with other objectives, such as biodiversity conservation, climate change adaptation and mitigation, human health, and water security, amongst others.</p>" +
                "<br>" +
                "<p>Previously, Belize relied primarily on engineered, gray infrastructure to address climate change challenges and biodiversity loss. However, a shift toward nature-based solutions (NbS) and civil society-led initiatives has occurred in recent years. Therefore, this inventory captures the past seven years (2018-2025) of NbS implementation in Belize. It is based on an extensive data collection process, which involved desk-based research, correspondence via email and phone with various organizations and government entities, meetings with representatives from non-governmental organizations (NGOs) and community-based organizations (CBOs), and a validation session with key actors who were involved.</p>" +
                "<br>" +
                "<p>The inventory has been developed by the International Institute for Sustainable Development (IISD) under the Climate Adaptation and Protected Areas (CAPA) Initiative funded by Global Affairs Canada (GAC). The CAPA Initiative is implemented in Belize by the Wildlife Conservation Society.</p>" +
                "<br>" +
                "<strong>Who is the NbS Inventory for? </strong>" +
                "<p>The inventory has been specifically designed to be utilized by actors working in or with an interest in the NbS sphere of work. These include but are not limited to:<ul><li>Government agencies involved in policy development and implementation</li><li>Local authorities</li><li>Protected areas managers</li><li>Indigenous communities</li><li>Civil society organizations</li><li>Funding agencies (i.e., philanthropies, donor partners)</li><li>Academia</li></ul></p>" +
                "<br>" +
                "<strong>What are NbS? </strong>" +
                "<p>NbS are “actions to protect, conserve, restore, sustainably use and manage natural or modified terrestrial, freshwater, coastal and marine ecosystems which address social, economic and environmental challenges effectively and adaptively, while simultaneously providing human well-being, ecosystem services, resilience and biodiversity benefits” (United Nations Environment Assembly, 2022). These actions help people and communities mitigate and adapt to climate change and increase ecosystem resilience. They can also provide social co-benefits by recognizing and involving underrepresented groups as active agents of change within the implementation of NbS for adaptation.</p>" +
                "<br>" +
                "<strong>Ecosystem-based Adaptation in Belize</strong>" +
                "<p>Ecosystem-based adaptation (EbA) actions, a subset of NbS, use “biodiversity and ecosystem services as part of an overall adaptation strategy to help people adapt to the adverse effects of climate change” (Convention on Biological Diversity, 2009). They include measures that protect, conserve, restore, sustainably use, and manage natural ecosystems with the aim of strengthening the resilience of communities and ecosystems to the impacts of climate change. They involve assessing how climate change will affect ecosystems and people of all genders and social backgrounds and identifying how ecosystems could help address these impacts to people. EbA is synonymous with NbS for adaptation. </p>" +
                "<br>" +
                "<strong>Why do NbS and EbA matter for Belize?</strong>" +
                "<p>Belize boasts a wealth of biodiversity, including the Belize Barrier Reef Reserve System, which protects various ecosystems including mangrove forests, coral reefs, and seagrass beds, and the Maya Forest Corridor, which is home to notable tropical species, such as jaguars, Baird’s tapirs, and white-lipped peccaries. However, the country’s flat, low-lying terrain, extensive coastline, and over 1,060 small islands exacerbate its vulnerability to a range of climate hazards, including sea level rise, ocean acidification, hurricanes, flooding, drought, and wildfires (Ministry of Sustainable Development, Climate Change, and Disaster Risk Management, 2021; National Climate Change Office, 2021). These hazards pose significant threats to Belize’s population, environmental integrity, and socio-economic development. As Belize continues to face the impacts of climate change, implementing effective ecosystem-based adaptation strategies, including NbS and EbA, is essential to strengthen the resilience of the country’s population, biodiversity, and ecosystems.</p>" +
                "<br>" +
                "<strong>What are we learning about NbS in Belize?</strong>" +
                "<p>A key outcome of the NbS Inventory was to show the concentration and spread of NbS projects throughout the country. NbS projects are being implemented in all districts across Belize, with an even distribution of projects across the Corozal, Stann Creek, and Toledo districts (10-11 projects per district) (see Figure 1). The district with the most projects is the Belize district (18 projects), while the district with the least projects is Orange Walk (5 projects). The extensive number of projects across the country can be attributed to increased financial support from the Government of Belize and external funders, the recent integration of NbS into national policies, and leadership and initiative from civil society actors. The main implementers of NbS in Belize are NGOs, CBOs, associations, and communities.</p>" +
                "<br>" +
                "<p>The types of NbS projects being implemented in Belize are diverse, from reforestation, community-based fire management, and climate-smart agriculture in terrestrial areas to mangrove and restoration, and the expansion of protection areas in marine and coastal landscapes. </p>" +
                "<br>" +
                "<p>Figure 1. Distribution of NbS projects in Belize by district.</p>" +
                "<table>" +
                "<tr><th>District</th><th>Project Count</th></tr>" +
                "<tr><td>Corozal</td><td>10</td></tr>" +

                "<tr><td>Stann Creek</td><td>11</td></tr>" +
                "<tr><td>Toledo</td><td>10</td></tr>" +
                "</table>"







            makeOverlayWindow(html)
        }

        function getFilteredDataset(type, textValue) {
            if (!textValue || textValue.trim() === "") return dataset;

            const search = textValue.trim().toLowerCase();

            return dataset.filter(project => {
                switch (type) {
                    case FILTER_TYPES.ONGOING:
                        return project.status === "Ongoing";
                    case FILTER_TYPES.COMPLETED:
                        return project.status === "Completed";
                    case FILTER_TYPES.NAME:
                        return project.title?.toLowerCase().includes(search);
                    case FILTER_TYPES.ECOSYSTEMS:
                        return (project.details?.ecosystemsTargeted || []).some(item => item.toLowerCase().includes(search));
                    case FILTER_TYPES.CHALLENGES:
                        return (project.details?.societalChallenges || []).some(item => item.toLowerCase().includes(search));
                    default:
                        return true;
                }
            });
        }

        function updateFilterOption(option) {
            const pFilter = document.getElementById("p_filter");
            const isStatusFilter = option === FILTER_TYPES.ONGOING || option === FILTER_TYPES.COMPLETED;

            pFilter.classList.toggle("hidden-filter", isStatusFilter);
            pFilter.value = "";

            const results = getFilteredDataset(option, isStatusFilter ? "status_mode" : "");
            renderCards(results);
        }

        function updateFilterByString(text) {
            const pFilterType = document.getElementById("p_filter_type").value;
            const results = getFilteredDataset(pFilterType, text);
            renderCards(results);
        }

        // Fetch location_coordinates.csv and map it to a JSON array
        function buildGeoJSON() {
            return fetchFile("location_coordinates.csv").then((data) => {
                const lines = data.trim().split("\n");
                const coord_dict = {};
                // Loop through each line of the CSV file
                lines.slice(1).forEach(line => {
                    const values = line.split(",");
                    if (values.length < 4) return; // Skip broken rows
                    const district = values[0].trim().toLowerCase();
                    const locationName = values[1].trim();
                    const lat = parseFloat(values[2]);
                    const long = parseFloat(values[3]);
                    // If coordinates are valid numbers and not zeros, save them
                    // This will remove any location that has 0,0 for latlong in location_coordinates.csv
                    if (!isNaN(lat) && !isNaN(long) && (lat !== 0 || long !== 0)) {
                        const lower_loc = locationName.toLowerCase();
                        let lookup_Key;
                        // exclusion check and key creation
                        if (clean_exclusions.some(ex => lower_loc.includes(ex))) {
                            lookup_Key = `${district.replace(/[^a-z0-9]/g, '')}_${lower_loc.replace(/[^a-z0-9]/g, '')}`;
                        } else {
                            // Normal cleanup rules for everything else
                            const cleanLoc = lower_loc.replace(/\s+village\s*|\s+town\s*/g, '').replace(/[^a-z0-9]/g, '');
                            lookup_Key = `${district.replace(/[^a-z0-9]/g, '')}_${cleanLoc}`;
                        }
                        coord_dict[lookup_Key] = { lat, long, originalName: locationName };
                    }
                });
                // Loop through loaded project list
                const features = [];
                dataset.forEach(project => {
                    // Loop through each district inside the current project's location list
                    Object.entries(project.locations).forEach(([district, locations]) => {
                        const cleanDistKey = district.toLowerCase();
                        // Loop through every location name inside that district
                        locations.forEach(locName => {
                            const lower_loc = locName.toLowerCase();
                            let clean_loc_key;

                            // exclusion check and key lookup
                            if (clean_exclusions.some(ex => lower_loc.includes(ex))) {
                                clean_loc_key = lower_loc.replace(/[^a-z0-9]/g, '');
                            } else {
                                clean_loc_key = lower_loc.replace(/\s+village\s*|\s+town\s*/g, '').replace(/[^a-z0-9]/g, '');
                            }

                            const match = coord_dict[`${cleanDistKey}_${clean_loc_key}`];
                            // If match found, build the map marker object
                            if (match) {
                                features.push({
                                    type: "Feature",
                                    geometry: { type: "Point", coordinates: [match.long, match.lat] },
                                    properties: {
                                        project_id: project.project_id,
                                        district: district,
                                        location: match.originalName,
                                        project_title: project.title,
                                    }
                                });
                            }
                        });
                    });
                });
                geojson_features.features = features;
                loadDefaultMap();
            });
        }

        function initData() {
            buildProjectCardSideBar().then(() => {
                buildGeoJSON()
            })

            document.getElementById("about_inventory_text").addEventListener('click', function () {
                showAboutInfo();
            })
        }

                        for="p_filter_type"><strong>Search
                            Projects
                            by</strong></label>
                    <select name="p_filter_type" id="p_filter_type" onchange="updateFilterOption(this.value)">
                        <option value="filter_type_name">Name</option>
                        <option value="filter_type_ongoing">Ongoing</option>
                        <option value="filter_type_completed">Completed</option>
                        <option value="filter_type_ecosystems">Ecosystem Targeted</option>
                        <option value="filter_type_challenges">Societal Challenge</option>

                    <a href="https://www.uberibz.org/nbs-project-submission" target="_blank"><strong>Submit a new
                            Project</strong></a>
                </strong>

            <div class="header-bar-block " style="margin-right: 20px; cursor:pointer">

    </div>
    <div style="height:90vh; width: 100vw; display: flex;">

        <div id="sidebar_container" style="margin: 0; padding:0; height: 100%;flex: 1.25; overflow-y:hidden;">
            <div id="sidebar_loader" class="sidebar-overlay">
                <div class="loader"></div>
            </div>
            <div id="proj_card_display"></div>
        </div>

        <div id="leaflet_map_container" style="margin: 0; padding:0; height: 100%;flex: 4; position: relative">
            <div id="map"></div>
        </div>
    </div>
    <!--Script for loading the map and its markers-->
    <script>
        var map = L.map("map").setView([17.097111994309312, -88.71966058916018], 8);

        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;
            console.log("Latitude: " + lat + ", Longitude: " + lng);
        });

        function makeMarkerLayer() {
            return geoJsonLayer = L.geoJSON(geojson_features, {
                onEachFeature: function (feature, layer) {
                    layer.bindPopup('<p>' + feature.properties.project_title + ' ' + feature.properties.district + ' ' + feature.properties.location + '</p>');
                }
            });
        }

        // Adds all markers from geojson_features to the map.
        function loadDefaultMap() {
            markers = L.markerClusterGroup({
                disableClusteringAtZoom: 15,
                showCoverageOnHover: false
            });
            markers.addLayer(makeMarkerLayer());
            map.addLayer(markers);
        }

        // Clears the markers from the Map and then re-adds all markers from geojson_features to the map.
        function refreshMap() {
            markers.clearLayers();
            loadDefaultMap();
        }
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 14,
            attribution:
                '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        }).addTo(map);


        // Add a refresh button to the map
        var refreshControl = L.Control.extend({
            options: {
                position: 'topleft'
            },
            onAdd: function (map) {
                var btn = L.DomUtil.create('button', 'leaflet-bar refresh-btn');
                btn.innerHTML = '<img src="./static/img/icon/refresh-icon.png" style="width: 100%; height: 100%; object-fit: contain;" alt="Refresh">';
                btn.title = 'Refresh Map Markers';

                btn.style.backgroundColor = 'white';
                btn.style.width = '35px';
                btn.style.height = '35px';
                btn.style.cursor = 'pointer';

                L.DomEvent.on(btn, 'click', function (e) {
                    L.DomEvent.stopPropagation(e);
                    refreshMap();
                });

                return btn;
            }
        });
        map.addControl(new refreshControl());

        // Clears the markers from the Map and then adds only those that match the specified values proided
        function filterMarkersByProperty(propName, propVal) {
            markers.clearLayers();
            markers = L.markerClusterGroup({
                disableClusteringAtZoom: 15,
                showCoverageOnHover: false
            });
            var geoJsonLayer = L.geoJSON(geojson_features, {
                filter: function (feature) {
                    return feature.properties[propName].toString().toLowerCase() === propVal.toString().toLowerCase();
                },
                onEachFeature: function (feature, layer) {
                    layer.bindPopup('<p>' + feature.properties.project_title + ' ' + feature.properties.district + ' ' + feature.properties.location + '</p>');
                }
            });
            markers.addLayer(geoJsonLayer);
            map.addLayer(markers);
        }

    </script>
</body>
